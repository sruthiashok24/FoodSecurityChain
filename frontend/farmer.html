<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Farmer Portal | Farm2Fork</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#f4f7f4;color:#1a2e1a;min-height:100vh;padding:30px 20px}
    .header{text-align:center;margin-bottom:28px}
    .header h1{font-size:26px;color:#1b5e20;letter-spacing:2px;font-weight:700}
    .header p{color:#4a6e4a;font-size:12px;margin-top:5px}
    .back-link{display:inline-block;margin-bottom:16px;font-size:12px;color:#2e7d32;text-decoration:none;font-weight:600}
    .back-link:hover{text-decoration:underline}
    .account-bar{text-align:center;font-size:11px;color:#4a6e4a;margin-bottom:20px;font-family:'DM Mono',monospace;background:#e8f5e9;border:1px solid #a5d6a7;border-radius:6px;padding:6px;max-width:540px;margin:0 auto 16px}
    .account-bar span{color:#1b5e20;font-weight:600}
    .card{background:#fff;border:1.5px solid #c8e6c9;border-radius:12px;padding:24px;max-width:540px;margin:0 auto 20px;box-shadow:0 2px 8px rgba(0,0,0,0.07)}
    .card h2{font-size:13px;color:#1b5e20;margin-bottom:18px;border-bottom:1.5px solid #c8e6c9;padding-bottom:10px;letter-spacing:1px;font-weight:700;text-transform:uppercase;font-family:'DM Mono',monospace}
    label{display:block;font-size:11px;color:#4a6e4a;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
    input{width:100%;padding:10px 12px;background:#f9fdf9;border:1.5px solid #c8e6c9;border-radius:8px;color:#1a2e1a;font-size:13px;margin-bottom:14px;outline:none;font-family:'DM Sans',sans-serif}
    input:focus{border-color:#2e7d32;background:#fff}
    button{width:100%;padding:12px;background:#1b5e20;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;font-family:'DM Sans',sans-serif;transition:background .2s}
    button:hover{background:#2e7d32}
    button:disabled{background:#a5d6a7;cursor:not-allowed}
    .status{text-align:center;margin-top:14px;font-size:12px;min-height:20px;font-weight:600}
    .status.success{color:#1b5e20}.status.error{color:#c62828}.status.loading{color:#e65100}
    .batch-list{max-width:540px;margin:0 auto}
    .batch-item{background:#fff;border:1.5px solid #c8e6c9;border-radius:10px;padding:16px 20px;margin-bottom:12px;box-shadow:0 2px 6px rgba(0,0,0,0.05)}
    .bid{font-size:11px;color:#1b5e20;font-weight:700;letter-spacing:1px;margin-bottom:4px;font-family:'DM Mono',monospace}
    .bname{font-size:16px;font-weight:700;color:#1a2e1a;margin-bottom:4px}
    .bdetail{font-size:12px;color:#4a6e4a;line-height:1.7}
    .bts{font-size:11px;color:#2e7d32;margin-top:6px;font-family:'DM Mono',monospace;background:#e8f5e9;padding:4px 8px;border-radius:4px;display:inline-block}
    .state-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-top:8px}
    .state-0{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7}
    .state-1{background:#e3f2fd;color:#0d47a1;border:1px solid #90caf9}
    .state-2{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
    .state-3{background:#fff3e0;color:#bf360c;border:1px solid #ffcc80}
    .state-4{background:#ede7f6;color:#4a148c;border:1px solid #ce93d8}
  </style>
</head>
<body>
  <div class="header">
    <h1>🌾 FARM2FORK</h1>
    <p>Farmer Portal — Register Your Food Batch on Blockchain</p>
  </div>
  <div style="text-align:center"><a class="back-link" href="index.html">← Back to Home</a></div>
  <div class="account-bar">Connected: <span id="accountAddr">Loading...</span></div>

  <div class="card">
    <h2>Register New Food Batch</h2>
    <label>Crop Type</label>
    <input type="text" id="cropType" placeholder="e.g. Rice, Wheat, Tomato"/>
    <label>Farmer Name</label>
    <input type="text" id="farmerName" placeholder="e.g. Ramu"/>
    <label>Location</label>
    <input type="text" id="location" placeholder="e.g. Erode, Tamil Nadu"/>
    <label>Quantity (kg)</label>
    <input type="number" id="quantity" placeholder="e.g. 100"/>
    <label>Price per kg (₹)</label>
    <input type="number" id="price" placeholder="e.g. 20"/>
    <label>Harvest Date</label>
    <input type="date" id="harvestDate"/>
    <button id="registerBtn" onclick="registerBatch()">Register Batch on Blockchain</button>
    <div class="status" id="status"></div>
  </div>

  <div class="batch-list" id="batchList"></div>

  <script src="./web3.min.js"></script>
  <script>
    const CONTRACT_ADDRESS = "0xC771a68c1A77b111bB6512D9e6764F6a7371B19A";
    const ABI = [{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"anonymous":false,"inputs":[{"indexed":true,"name":"batchId","type":"uint256"},{"indexed":false,"name":"cropType","type":"string"},{"indexed":false,"name":"farmerName","type":"string"},{"indexed":false,"name":"location","type":"string"},{"indexed":false,"name":"quantity","type":"uint256"},{"indexed":false,"name":"price","type":"uint256"},{"indexed":false,"name":"harvestDate","type":"string"}],"name":"BatchCreated","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"batchId","type":"uint256"},{"indexed":false,"name":"inspector","type":"address"}],"name":"BatchApproved","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"batchId","type":"uint256"},{"indexed":false,"name":"inspector","type":"address"}],"name":"BatchRejected","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"batchId","type":"uint256"},{"indexed":false,"name":"vehicleNumber","type":"string"},{"indexed":false,"name":"destination","type":"string"}],"name":"BatchShipped","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"batchId","type":"uint256"},{"indexed":false,"name":"retailerName","type":"string"}],"name":"BatchDelivered","type":"event"},{"inputs":[{"name":"_cropType","type":"string"},{"name":"_farmerName","type":"string"},{"name":"_location","type":"string"},{"name":"_quantity","type":"uint256"},{"name":"_price","type":"uint256"},{"name":"_harvestDate","type":"string"}],"name":"createBatch","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"_id","type":"uint256"}],"name":"approveBatch","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"_id","type":"uint256"}],"name":"rejectBatch","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"_id","type":"uint256"},{"name":"_vehicleNumber","type":"string"},{"name":"_destination","type":"string"}],"name":"shipBatch","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"_id","type":"uint256"},{"name":"_retailerName","type":"string"}],"name":"deliverBatch","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"_id","type":"uint256"}],"name":"getBatch","outputs":[{"components":[{"name":"id","type":"uint256"},{"name":"cropType","type":"string"},{"name":"farmerName","type":"string"},{"name":"location","type":"string"},{"name":"quantity","type":"uint256"},{"name":"price","type":"uint256"},{"name":"harvestDate","type":"string"},{"name":"state","type":"uint8"},{"name":"vehicleNumber","type":"string"},{"name":"destination","type":"string"},{"name":"retailerName","type":"string"},{"name":"exists","type":"bool"}],"name":"","type":"tuple"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"_id","type":"uint256"}],"name":"getStateString","outputs":[{"name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"batchCount","outputs":[{"name":"","type":"uint256"}],"stateMutability":"view","type":"function"}];

    let web3, contract, accounts;
    const states = ["Harvested","Approved","Rejected","Shipped","Delivered"];

    function fmtTs(unix) {
      if (!unix) return "—";
      const d = new Date(unix * 1000);
      return d.toLocaleString('en-IN', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true});
    }

    async function getEventTimestamp(eventName, batchId) {
      try {
        const events = await contract.getPastEvents(eventName, {
          filter: { batchId: batchId },
          fromBlock: 0, toBlock: 'latest'
        });
        if (events.length > 0) {
          const block = await web3.eth.getBlock(events[0].blockNumber);
          return block.timestamp;
        }
      } catch(e) {}
      return null;
    }

    async function init() {
      web3 = new Web3("http://127.0.0.1:7545");
      accounts = await web3.eth.getAccounts();
      contract = new web3.eth.Contract(ABI, CONTRACT_ADDRESS);
      document.getElementById("accountAddr").textContent = accounts[0];
      loadBatches();
    }

    async function registerBatch() {
      const cropType = document.getElementById("cropType").value.trim();
      const farmerName = document.getElementById("farmerName").value.trim();
      const location = document.getElementById("location").value.trim();
      const quantity = document.getElementById("quantity").value;
      const price = document.getElementById("price").value;
      const harvestDate = document.getElementById("harvestDate").value;
      if (!cropType||!farmerName||!location||!quantity||!price||!harvestDate) {
        setStatus("Please fill all fields!","error"); return;
      }
      try {
        setStatus("Registering on blockchain...","loading");
        document.getElementById("registerBtn").disabled = true;
        await contract.methods.createBatch(cropType,farmerName,location,quantity,price,harvestDate).send({from:accounts[0],gas:500000});
        setStatus("Batch registered successfully on blockchain!","success");
        document.getElementById("registerBtn").disabled = false;
        ["cropType","farmerName","location","quantity","price","harvestDate"].forEach(id=>document.getElementById(id).value="");
        loadBatches();
      } catch(err) {
        setStatus("Error: "+err.message,"error");
        document.getElementById("registerBtn").disabled = false;
      }
    }

    async function loadBatches() {
      const count = await contract.methods.batchCount().call();
      const list = document.getElementById("batchList");
      list.innerHTML = "";
      for (let i = count; i >= 1; i--) {
        const b = await contract.methods.getBatch(i).call();
        const stateNum = parseInt(b.state);
        const ts = await getEventTimestamp('BatchCreated', i);
        list.innerHTML += `
          <div class="batch-item">
            <div class="bid">BATCH #${b.id}</div>
            <div class="bname">${b.cropType}</div>
            <div class="bdetail">
              Farmer: ${b.farmerName} &nbsp;|&nbsp; Location: ${b.location} &nbsp;|&nbsp;
              Qty: ${b.quantity} kg &nbsp;|&nbsp; Price: ₹${b.price}/kg &nbsp;|&nbsp; Date: ${b.harvestDate}
            </div>
            <div class="bts">🕐 Registered: ${fmtTs(ts)}</div><br>
            <span class="state-badge state-${stateNum}">${states[stateNum]}</span>
          </div>`;
      }
      if (count == 0) list.innerHTML = `<p style="text-align:center;color:#4a6e4a;font-size:13px;">No batches registered yet.</p>`;
    }

    function setStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg; el.className = "status " + type;
    }

    init();
  </script>
</body>
</html>
