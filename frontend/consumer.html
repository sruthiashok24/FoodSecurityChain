<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Consumer Portal | Farm2Fork</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#f0faf8;color:#012e28;min-height:100vh;padding:30px 20px}
    .header{text-align:center;margin-bottom:24px}
    .header h1{font-size:26px;color:#004d40;letter-spacing:2px;font-weight:700}
    .header p{color:#2a6e64;font-size:12px;margin-top:5px}
    .back-link{display:inline-block;margin-bottom:12px;font-size:12px;color:#00695c;text-decoration:none;font-weight:600}
    .back-link:hover{text-decoration:underline}
    .search-card{background:#fff;border:1.5px solid #80cbc4;border-radius:12px;padding:20px;max-width:540px;margin:0 auto 20px;box-shadow:0 2px 8px rgba(0,0,0,0.07)}
    .search-card h2{font-size:13px;color:#004d40;margin-bottom:14px;letter-spacing:1px;font-weight:700;text-transform:uppercase;font-family:'DM Mono',monospace}
    .search-row{display:flex;gap:10px}
    input{flex:1;padding:10px 14px;background:#f0faf8;border:1.5px solid #80cbc4;border-radius:8px;color:#012e28;font-size:14px;outline:none;font-family:'DM Sans',sans-serif}
    input:focus{border-color:#00695c}
    .btn-track{padding:10px 20px;background:#00695c;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;font-family:'DM Sans',sans-serif;transition:background .2s}
    .btn-track:hover{background:#004d40}
    .result{max-width:540px;margin:0 auto}
    .batch-header{background:#fff;border:1.5px solid #80cbc4;border-radius:12px;padding:16px 20px;margin-bottom:16px;box-shadow:0 2px 6px rgba(0,0,0,0.06)}
    .btitle{font-size:18px;font-weight:700;color:#012e28;margin-bottom:6px}
    .bmeta{font-size:12px;color:#2a6e64;line-height:1.9}
    .state-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-top:8px}
    .s0{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7}
    .s1{background:#e3f2fd;color:#0d47a1;border:1px solid #90caf9}
    .s2{background:#ffebee;color:#c62828;border:1px solid #ef9a9a}
    .s3{background:#fff3e0;color:#bf360c;border:1px solid #ffcc80}
    .s4{background:#ede7f6;color:#4a148c;border:1px solid #ce93d8}
    .t-item{display:flex;gap:14px;margin-bottom:4px}
    .t-left{display:flex;flex-direction:column;align-items:center;width:38px}
    .t-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:2px solid #e0e0e0}
    .t-line{width:2px;background:#c8e6c9;flex:1;min-height:20px}
    .t-content{background:#fff;border:1.5px solid #b2dfdb;border-radius:8px;padding:12px 16px;margin-bottom:10px;flex:1;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
    .t-title{font-size:13px;font-weight:700;color:#012e28;margin-bottom:4px}
    .t-detail{font-size:11px;color:#2a6e64;line-height:1.8}
    .t-ts{font-size:11px;color:#00695c;font-family:'DM Mono',monospace;background:#e0f2f1;padding:3px 8px;border-radius:4px;display:inline-block;margin-top:5px}
    .t-pending{opacity:0.35}
    .verified-box{background:#fff;border:1.5px solid #00695c;border-radius:10px;padding:14px;text-align:center;margin-top:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06)}
    .vtitle{font-size:13px;font-weight:700;color:#004d40;margin-bottom:4px}
    .vdetail{font-size:11px;color:#2a6e64;font-family:'DM Mono',monospace}
    .error-msg{text-align:center;color:#c62828;font-size:13px;padding:20px;font-weight:600}
    .loading-msg{text-align:center;color:#e65100;font-size:13px;padding:20px;font-weight:600}
  </style>
</head>
<body>
  <div class="header">
    <h1>👤 FARM2FORK</h1>
    <p>Consumer Portal — Track Your Food's Complete Journey</p>
  </div>
  <div style="text-align:center"><a class="back-link" href="index.html">← Back to Home</a></div>

  <div class="search-card">
    <h2>Track Food Batch</h2>
    <div class="search-row">
      <input type="number" id="batchId" placeholder="Enter Batch ID (e.g. 1)" min="1"/>
      <button class="btn-track" onclick="trackBatch()">Track</button>
    </div>
  </div>

  <div class="result" id="result"></div>

  <script src="./web3.min.js"></script>
  <script>
    const CONTRACT_ADDRESS = "0xC771a68c1A77b111bB6512D9e6764F6a7371B19A";
    const ABI = [{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"anonymous":false,"inputs":[{"indexed":true,"name":"batchId","type":"uint256"},{"indexed":false,"name":"cropType","type":"string"},{"indexed":false,"name":"farmerName","type":"string"},{"indexed":false,"name":"location","type":"string"},{"indexed":false,"name":"quantity","type":"uint256"},{"indexed":false,"name":"price","type":"uint256"},{"indexed":false,"name":"harvestDate","type":"string"}],"name":"BatchCreated","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"batchId","type":"uint256"},{"indexed":false,"name":"inspector","type":"address"}],"name":"BatchApproved","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"batchId","type":"uint256"},{"indexed":false,"name":"inspector","type":"address"}],"name":"BatchRejected","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"batchId","type":"uint256"},{"indexed":false,"name":"vehicleNumber","type":"string"},{"indexed":false,"name":"destination","type":"string"}],"name":"BatchShipped","type":"event"},{"anonymous":false,"inputs":[{"indexed":true,"name":"batchId","type":"uint256"},{"indexed":false,"name":"retailerName","type":"string"}],"name":"BatchDelivered","type":"event"},{"inputs":[{"name":"_cropType","type":"string"},{"name":"_farmerName","type":"string"},{"name":"_location","type":"string"},{"name":"_quantity","type":"uint256"},{"name":"_price","type":"uint256"},{"name":"_harvestDate","type":"string"}],"name":"createBatch","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"_id","type":"uint256"}],"name":"approveBatch","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"_id","type":"uint256"}],"name":"rejectBatch","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"_id","type":"uint256"},{"name":"_vehicleNumber","type":"string"},{"name":"_destination","type":"string"}],"name":"shipBatch","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"_id","type":"uint256"},{"name":"_retailerName","type":"string"}],"name":"deliverBatch","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"name":"_id","type":"uint256"}],"name":"getBatch","outputs":[{"components":[{"name":"id","type":"uint256"},{"name":"cropType","type":"string"},{"name":"farmerName","type":"string"},{"name":"location","type":"string"},{"name":"quantity","type":"uint256"},{"name":"price","type":"uint256"},{"name":"harvestDate","type":"string"},{"name":"state","type":"uint8"},{"name":"vehicleNumber","type":"string"},{"name":"destination","type":"string"},{"name":"retailerName","type":"string"},{"name":"exists","type":"bool"}],"name":"","type":"tuple"}],"stateMutability":"view","type":"function"},{"inputs":[{"name":"_id","type":"uint256"}],"name":"getStateString","outputs":[{"name":"","type":"string"}],"stateMutability":"view","type":"function"},{"inputs":[],"name":"batchCount","outputs":[{"name":"","type":"uint256"}],"stateMutability":"view","type":"function"}];

    let web3, contract;
    const stateNames = ["Harvested","Approved","Rejected","Shipped","Delivered"];

    function fmtTs(unix) {
      if (!unix) return null;
      return new Date(unix*1000).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true});
    }

    async function getEventTimestamp(eventName, batchId) {
      try {
        const events = await contract.getPastEvents(eventName, {filter:{batchId:batchId},fromBlock:0,toBlock:'latest'});
        if (events.length > 0) {
          const block = await web3.eth.getBlock(events[0].blockNumber);
          return block.timestamp;
        }
      } catch(e) {}
      return null;
    }

    async function init() {
      web3 = new Web3("http://127.0.0.1:7545");
      contract = new web3.eth.Contract(ABI, CONTRACT_ADDRESS);
    }

    async function trackBatch() {
      const id = document.getElementById("batchId").value;
      const result = document.getElementById("result");
      if (!id || id < 1) {
        result.innerHTML = `<div class="error-msg">Please enter a valid Batch ID!</div>`;
        return;
      }
      result.innerHTML = `<div class="loading-msg">⏳ Fetching from blockchain...</div>`;
      try {
        const b = await contract.methods.getBatch(id).call();
        const state = parseInt(b.state);
        const done = (n) => state >= n;
        const rejected = state === 2;

        // Fetch all timestamps from events
        const tsCreated  = await getEventTimestamp('BatchCreated', parseInt(id));
        const tsApproved = rejected
          ? await getEventTimestamp('BatchRejected', parseInt(id))
          : await getEventTimestamp('BatchApproved', parseInt(id));
        const tsShipped  = await getEventTimestamp('BatchShipped', parseInt(id));
        const tsDelivered= await getEventTimestamp('BatchDelivered', parseInt(id));

        result.innerHTML = `
          <div class="batch-header">
            <div class="btitle">Batch #${b.id} — ${b.cropType}</div>
            <div class="bmeta">
              Farmer: ${b.farmerName} &nbsp;|&nbsp;
              Location: ${b.location} &nbsp;|&nbsp;
              Quantity: ${b.quantity} kg &nbsp;|&nbsp;
              Price: ₹${b.price}/kg &nbsp;|&nbsp;
              Harvest Date: ${b.harvestDate}
            </div>
            <span class="state-badge s${state}">${stateNames[state]}</span>
          </div>

          <div class="timeline">

            <!-- STEP 1: Harvested -->
            <div class="t-item">
              <div class="t-left">
                <div class="t-icon" style="background:#e8f5e9;border-color:#a5d6a7">🌾</div>
                <div class="t-line"></div>
              </div>
              <div style="flex:1">
                <div class="t-content">
                  <div class="t-title">Harvested</div>
                  <div class="t-detail">
                    Farmer: ${b.farmerName}<br>
                    Location: ${b.location}<br>
                    Crop: ${b.cropType} | ${b.quantity}kg | ₹${b.price}/kg<br>
                    Harvest Date: ${b.harvestDate}
                  </div>
                  ${tsCreated ? `<div class="t-ts">🕐 ${fmtTs(tsCreated)}</div>` : ''}
                </div>
              </div>
            </div>

            <!-- STEP 2: Inspected -->
            <div class="t-item ${(!rejected && !done(1)) ? 't-pending' : ''}">
              <div class="t-left">
                <div class="t-icon" style="background:${rejected ? '#ffebee' : '#e3f2fd'};border-color:${rejected ? '#ef9a9a' : '#90caf9'}">
                  ${rejected ? '❌' : '🔬'}
                </div>
                <div class="t-line"></div>
              </div>
              <div style="flex:1">
                <div class="t-content">
                  <div class="t-title">${rejected ? 'Rejected by Inspector' : 'Inspected & Approved'}</div>
                  <div class="t-detail">
                    ${rejected
                      ? 'Quality check failed. Batch rejected by inspector.'
                      : (done(1) ? 'Quality verified. Batch approved for distribution.' : 'Pending inspection...')}
                  </div>
                  ${tsApproved ? `<div class="t-ts">🕐 ${fmtTs(tsApproved)}</div>` : ''}
                </div>
              </div>
            </div>

            ${!rejected ? `
            <!-- STEP 3: Distributor Shipped -->
            <div class="t-item ${!done(3) ? 't-pending' : ''}">
              <div class="t-left">
                <div class="t-icon" style="background:#fff3e0;border-color:#ffcc80">🚚</div>
                <div class="t-line"></div>
              </div>
              <div style="flex:1">
                <div class="t-content">
                  <div class="t-title">Distributor — Shipped</div>
                  <div class="t-detail">
                    ${done(3)
                      ? `Vehicle No: ${b.vehicleNumber}<br>Destination: ${b.destination}`
                      : 'Waiting for distributor to ship...'}
                  </div>
                  ${tsShipped ? `<div class="t-ts">🕐 ${fmtTs(tsShipped)}</div>` : ''}
                </div>
              </div>
            </div>

            <!-- STEP 4: Retailer Confirmed Receipt -->
            <div class="t-item ${!done(4) ? 't-pending' : ''}">
              <div class="t-left">
                <div class="t-icon" style="background:#ede7f6;border-color:#ce93d8">🏪</div>
                <div class="t-line"></div>
              </div>
              <div style="flex:1">
                <div class="t-content">
                  <div class="t-title">Retailer — Confirmed Receipt</div>
                  <div class="t-detail">
                    ${done(4)
                      ? `Shop: ${b.retailerName}<br>Shipment received and stock accepted.`
                      : 'Waiting for retailer to confirm receipt...'}
                  </div>
                  ${tsDelivered ? `<div class="t-ts">🕐 ${fmtTs(tsDelivered)}</div>` : ''}
                </div>
              </div>
            </div>

            <!-- STEP 5: Delivered to Consumer -->
            <div class="t-item ${!done(4) ? 't-pending' : ''}">
              <div class="t-left">
                <div class="t-icon" style="background:#e0f2f1;border-color:#80cbc4">👤</div>
              </div>
              <div style="flex:1">
                <div class="t-content">
                  <div class="t-title">Consumer — Available for Purchase</div>
                  <div class="t-detail">
                    ${done(4)
                      ? `Food is now available at ${b.retailerName}.<br>Fully verified farm-to-fork journey complete.`
                      : 'Awaiting retailer confirmation...'}
                  </div>
                  ${tsDelivered ? `<div class="t-ts">🕐 ${fmtTs(tsDelivered)}</div>` : ''}
                </div>
              </div>
            </div>` : ''}

          </div>

          <div class="verified-box">
            <div class="vtitle">✅ Verified on Blockchain</div>
            <div class="vdetail">
              Tamper-proof &nbsp;|&nbsp; Immutable record &nbsp;|&nbsp;
              Network: Ganache (5777) &nbsp;|&nbsp; Batch ID: #${b.id}
            </div>
          </div>`;
      } catch(e) {
        result.innerHTML = `<div class="error-msg">Batch #${id} not found on blockchain.</div>`;
      }
    }

    init();
  </script>
</body>
</html>
